<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold Zakat Calculator 2026 | Accurate Zakat Calculation</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fcfcfc; padding: 20px; }
        .container { max-width: 600px; margin: 40px auto; padding: 30px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 6px solid #b8860b; }
        h1 { color: #b8860b; text-align: center; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #b8860b; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 18px; }
        .result { margin-top: 25px; padding: 20px; background: #fffdf5; border: 1px dashed #b8860b; border-radius: 8px; display: none; text-align: center; }
    </style>
</head>
<body>
<div class="container">
    <h1>Gold Zakat Calculator</h1>
    <label>Gold Weight (Grams):</label>
    <input type="number" id="weight" placeholder="e.g. 100">
    <label>Gold Purity:</label>
    <select id="price">
        <option value="564.26">24K (SAR 564.26/g)</option>
        <option value="517.24">22K (SAR 517.24/g)</option>
        <option value="493.73">21K (SAR 493.73/g)</option>
    </select>
    <button onclick="calc()">Calculate Zakat</button>
    <div id="res" class="result">
        <p id="totalVal"></p>
        <h2 id="zakatDue" style="color: #d9534f;"></h2>
    </div>
    <p style="text-align:center; margin-top:20px;"><a href="/index.html" style="color:#b8860b;">← Back to Hub</a></p>
</div>
<script>
function calc() {
    let w = document.getElementById('weight').value;
    let p = document.getElementById('price').value;
    if (w >= 87.48) {
        let total = w * p;
        let zakat = total * 0.025;
        document.getElementById('totalVal').innerText = "Total Gold Value: " + total.toLocaleString() + " SAR";
        document.getElementById('zakatDue').innerText = "Zakat Due (2.5%): " + zakat.toLocaleString() + " SAR";
        document.getElementById('res').style.display = 'block';
    } else {
        alert("Weight is below Nisab (87.48g). No Zakat due.");
    }
}
</script>
</body>
</html>
