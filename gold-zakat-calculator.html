<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold Zakat Calculator 2026 | Saudi Arabia</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fdfdfd; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 6px solid #b8860b; }
        h1 { color: #b8860b; text-align: center; }
        label { display: block; margin-top: 15px; font-weight: bold; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #b8860b; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 18px; margin-top: 20px; }
        .result { margin-top: 20px; padding: 20px; background: #fff9e6; border: 1px dashed #b8860b; border-radius: 8px; display: none; text-align: center; }
        .btn-home { display: block; text-align: center; margin-top: 30px; color: #b8860b; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <h1>Gold Zakat Calculator</h1>
    <label>Gold Weight (Grams):</label>
    <input type="number" id="goldWeight" placeholder="e.g., 100">
    
    <label>Gold Purity:</label>
    <select id="goldPrice">
        <option value="564.26">24K (SAR 564.26/g)</option>
        <option value="517.24">22K (SAR 517.24/g)</option>
        <option value="493.73">21K (SAR 493.73/g)</option>
    </select>
    
    <button onclick="calculateZakat()">Calculate Zakat Due</button>
    
    <div id="zakatResult" class="result">
        <p id="valuationText"></p>
        <h2 id="finalZakat" style="color: #d9534f;"></h2>
    </div>
    
    <a href="/index.html" class="btn-home">← Back to Main Menu</a>
</div>

<script>
function calculateZakat() {
    let weight = parseFloat(document.getElementById('goldWeight').value);
    let price = parseFloat(document.getElementById('goldPrice').value);
    let resultDiv = document.getElementById('zakatResult');

    if (weight >= 87.48) {
        let totalVal = weight * price;
        let zakat = totalVal * 0.025;
        document.getElementById('valuationText').innerText = "Total Value: " + totalVal.toLocaleString() + " SAR";
        document.getElementById('finalZakat').innerText = "Zakat Due (2.5%): " + zakat.toLocaleString() + " SAR";
        resultDiv.style.display = 'block';
    } else {
        alert("Gold weight is below the Nisab (87.48g). No Zakat is due.");
        resultDiv.style.display = 'none';
    }
}
</script>
</body>
</html>
