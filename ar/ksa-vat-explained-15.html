<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة ضريبة القيمة المضافة 15% | حساب الضريبة في السعودية 2026</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f8f9fa; color: #333; margin: 0; padding: 20px; text-align: right; }
        .container { max-width: 700px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .calc-card { background: #f1f8ff; border: 1px solid #d1e7ff; padding: 25px; border-radius: 10px; margin-bottom: 30px; }
        h1 { color: #004a99; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; text-align: center; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; }
        .btn-add { background: #004a99; color: white; }
        .btn-remove { background: #6c757d; color: white; }
        .res-box { margin-top: 20px; padding: 15px; background: white; border-radius: 8px; border: 2px dashed #004a99; display: none; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>حاسبة ضريبة القيمة المضافة (15%)</h1>
    
    <div class="calc-card">
        <label>أدخل المبلغ (ريال سعودي):</label>
        <input type="number" id="vatAmountAr" placeholder="مثال: 1000">
        <div class="btn-group">
            <button class="btn-add" onclick="calcVATAr(true)">إضافة الضريبة (15%)</button>
            <button class="btn-remove" onclick="calcVATAr(false)">خصم الضريبة (15%)</button>
        </div>

        <div id="resultAr" class="res-box">
            <p id="netAr"></p>
            <p id="taxAr" style="color: #004a99; font-weight: bold;"></p>
            <h2 id="totalAr"></h2>
        </div>
    </div>

    <div style="line-height: 1.8;">
        <h2>كيفية حساب الضريبة في السعودية؟</h2>
        <p>بناءً على تعليمات هيئة الزكاة والضريبة والجمارك (ZATCA)، تبلغ نسبة الضريبة الحالية <strong>15%</strong>.</p>
        <ul>
            <li><strong>لحساب السعر شامل الضريبة:</strong> اضرب المبلغ في 1.15.</li>
            <li><strong>لاستخراج قيمة الضريبة فقط:</strong> اضرب المبلغ في 0.15.</li>
        </ul>
    </div>
</div>

<script>
function calcVATAr(isAdding) {
    let amount = parseFloat(document.getElementById('vatAmountAr').value);
    if (!amount) return;
    let vat, total, net;
    if (isAdding) {
        net = amount; vat = amount * 0.15; total = amount + vat;
        document.getElementById('netAr').innerText = "المبلغ الصافي: " + net.toFixed(2) + " ريال";
    } else {
        total = amount; net = amount / 1.15; vat = amount - net;
        document.getElementById('netAr').innerText = "المبلغ قبل الضريبة: " + net.toFixed(2) + " ريال";
    }
    document.getElementById('taxAr').innerText = "قيمة الضريبة (15%): " + vat.toFixed(2) + " ريال";
    document.getElementById('totalAr').innerText = "الإجمالي: " + total.toFixed(2) + " ريال";
    document.getElementById('resultAr').style.display = 'block';
}
    <div style="text-align: center; margin: 40px 0; padding: 20px; background: #f9f9f9; border-radius: 8px; direction: rtl;">
    <p style="font-size: 18px; font-weight: bold; color: #333;">هل تبحث عن أداة أخرى؟</p>
    <a href="/ar/index.html" style="display: inline-block; padding: 12px 25px; background: #b8860b; color: white; text-decoration: none; border-radius: 5px; font-weight: bold;">
        ← عرض جميع الحاسبات والأدوات السعودية
    </a>
</div>
</script>
</body>
</html>
