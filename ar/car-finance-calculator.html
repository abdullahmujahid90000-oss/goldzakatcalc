<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة تمويل السيارات الشاملة 2026 | شامل التأمين</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; padding: 20px; text-align: right; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.1); }
        .calc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; background: #f9f9f9; padding: 25px; border-radius: 12px; }
        h1 { color: #1a3a5f; text-align: center; }
        label { font-weight: bold; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 6px; text-align: center; }
        button { grid-column: span 2; padding: 15px; background: #1a3a5f; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .result-box { grid-column: span 2; margin-top: 20px; padding: 20px; background: #eef6ff; border: 2px dashed #1a3a5f; border-radius: 10px; text-align: center; display: none; }
        .nav-footer { text-align: center; margin-top: 40px; padding: 20px; background: #f9f9f9; border-radius: 10px; }
        .btn-home { display: inline-block; padding: 12px 25px; background: #b8860b; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>حاسبة تمويل جميع السيارات</h1>
    
    <div class="calc-grid">
        <div style="grid-column: span 2;">
            <label>حالة السيارة:</label>
            <select id="typeAr" onchange="updateAr()">
                <option value="new">جديدة (وكالة)</option>
                <option value="used">مستعملة (معرض / حراج)</option>
            </select>
        </div>
        <div>
            <label>السعر (ريال):</label>
            <input type="number" id="pAr" placeholder="مثال: 100000">
        </div>
        <div>
            <label>الدفعة الأولى (ريال):</label>
            <input type="number" id="dAr" placeholder="مثال: 10000">
        </div>
        <button onclick="calcAr()">احسب القسط الشهري</button>

        <div id="resAr" class="result-box">
            <p>القسط الشهري الإجمالي (شامل التأمين):</p>
            <h2 id="outAr" style="color: #1a3a5f;"></h2>
        </div>
    </div>

    <div class="nav-footer">
        <p>هل تبحث عن أداة أخرى؟</p>
        <a href="/ar/index.html" class="btn-home">← العودة للرئيسية</a>
    </div>
</div>

<script>
function updateAr() {
    // Logic for rates can be added here if needed
}
function calcAr() {
    let p = parseFloat(document.getElementById('pAr').value);
    let d = parseFloat(document.getElementById('dAr').value) || 0;
    if (!p) return;
    let loan = p - d;
    let monthlyLoan = (loan * 0.00375) / (1 - Math.pow(1 + 0.00375, -60)); // Default 4.5% over 5 years
    let monthlyIns = (p * 0.04) / 12;
    document.getElementById('outAr').innerText = Math.round(monthlyLoan + monthlyIns).toLocaleString() + " ريال سعودي";
    document.getElementById('resAr').style.display = 'block';
}
</script>
</body>
</html>
