<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة زكاة الذهب 2026 | حساب دقيق للزكاة</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fcfcfc; padding: 20px; text-align: right; }
        .container { max-width: 600px; margin: 40px auto; padding: 30px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 6px solid #b8860b; }
        h1 { color: #b8860b; text-align: center; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; text-align: center; }
        button { width: 100%; padding: 15px; background: #b8860b; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .result { margin-top: 25px; padding: 20px; background: #fffdf5; border: 1px dashed #b8860b; border-radius: 8px; display: none; text-align: center; }
    </style>
</head>
<body>
<div class="container">
    <h1>حاسبة زكاة الذهب</h1>
    <label>وزن الذهب (جرام):</label>
    <input type="number" id="wAr" placeholder="مثال: 100">
    <label>عيار الذهب:</label>
    <select id="pAr">
        <option value="564.26">عيار 24 (564.26 ريال)</option>
        <option value="517.24">عيار 22 (517.24 ريال)</option>
        <option value="493.73">عيار 21 (493.73 ريال)</option>
    </select>
    <button onclick="calcAr()">احسب الزكاة</button>
    <div id="resAr" class="result">
        <p id="totalAr"></p>
        <h2 id="zakatAr" style="color: #d9534f;"></h2>
    </div>
    <p style="text-align:center; margin-top:20px;"><a href="/ar/index.html" style="color:#b8860b;">← العودة للرئيسية</a></p>
</div>
<script>
function calcAr() {
    let w = document.getElementById('wAr').value;
    let p = document.getElementById('pAr').value;
    if (w >= 87.48) {
        let total = w * p;
        let zakat = total * 0.025;
        document.getElementById('totalAr').innerText = "إجمالي قيمة الذهب: " + total.toLocaleString() + " ريال";
        document.getElementById('zakatAr').innerText = "مقدار الزكاة (2.5%): " + zakat.toLocaleString() + " ريال";
        document.getElementById('resAr').style.display = 'block';
    } else {
        alert("الوزن أقل من النصاب (87.48 جرام). لا تجب الزكاة.");
    }
}
</script>
</body>
</html>
