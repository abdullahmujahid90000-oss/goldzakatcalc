<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة مكافأة نهاية الخدمة 2026 | قانون العمل السعودي</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; padding: 20px; text-align: right; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 12px; border-top: 6px solid #2d5a27; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; text-align: center; }
        button { width: 100%; padding: 15px; background: #2d5a27; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .res { margin-top: 20px; padding: 20px; background: #e8f5e9; border-radius: 8px; display: none; text-align: center; }
    </style>
</head>
<body>
<div class="container">
    <h2 style="text-align:center; color:#2d5a27;">حاسبة مكافأة نهاية الخدمة</h2>
    <label>آخر راتب أساسي + البدلات الثابتة (ريال):</label>
    <input type="number" id="salAr" placeholder="مثال: 10000">
    <label>عدد سنوات الخدمة:</label>
    <input type="number" id="yAr" placeholder="مثال: 5">
    <label>سبب انتهاء العلاقة التعاقدية:</label>
    <select id="reasonAr">
        <option value="term">إنهاء العقد من قبل الشركة</option>
        <option value="resign">استقالة</option>
    </select>
    
    <button onclick="calcEOSAr()">احسب المكافأة</button>
    
    <div id="eosResAr" class="res">
        <p>مبلغ المكافأة التقديري:</p>
        <h2 id="rewardAr" style="color:#2d5a27;"></h2>
    </div>
    
    <p style="text-align:center; margin-top:20px;"><a href="/ar/index.html" style="color:#2d5a27; text-decoration:none; font-weight:bold;">← العودة للقائمة الرئيسية</a></p>
</div>

<script>
function calcEOSAr() {
    let s = parseFloat(document.getElementById('salAr').value);
    let y = parseFloat(document.getElementById('yAr').value);
    let r = document.getElementById('reasonAr').value;
    if(!s || !y) return;

    let base = (y <= 5) ? (s / 2) * y : (s / 2) * 5 + (s * (y - 5));
    let final = base;

    if (r === "resign") {
        if (y < 2) final = 0;
        else if (y < 5) final = base * (1/3);
        else if (y < 10) final = base * (2/3);
    }
    document.getElementById('rewardAr').innerText = Math.round(final).toLocaleString() + " ريال";
    document.getElementById('eosResAr').style.display = 'block';
}
</script>
</body>
</html>
