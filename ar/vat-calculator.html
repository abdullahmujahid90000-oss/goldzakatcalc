<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة ضريبة القيمة المضافة 15% السعودية</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f8f9fa; padding: 20px; text-align: right; }
        .container { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 12px; border-top: 6px solid #004a99; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 18px; text-align: center; }
        .btn-group { display: flex; gap: 10px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; }
        .add { background: #004a99; }
        .remove { background: #6c757d; }
        .res { margin-top: 20px; padding: 20px; background: #f1f8ff; border-radius: 8px; display: none; text-align: center; }
    </style>
</head>
<body>
<div class="container">
    <h2 style="text-align:center; color:#004a99;">حاسبة الضريبة (15%)</h2>
    <input type="number" id="amtAr" placeholder="أدخل المبلغ بالريال">
    <div class="btn-group">
        <button class="add" onclick="vatAr(true)">إضافة ضريبة (15%)</button>
        <button class="remove" onclick="vatAr(false)">استخراج الضريبة</button>
    </div>
    
    <div id="vOutAr" class="res">
        <p id="vTaxAr"></p>
        <h2 id="vTotalAr"></h2>
    </div>
    
    <p style="text-align:center; margin-top:20px;"><a href="/ar/index.html" style="color:#004a99; text-decoration:none; font-weight:bold;">← العودة للقائمة الرئيسية</a></p>
</div>

<script>
function vatAr(isAdd) {
    let a = parseFloat(document.getElementById('amtAr').value);
    if(!a) return;
    let t, total;
    if(isAdd) {
        t = a * 0.15; total = a + t;
        document.getElementById('vTaxAr').innerText = "قيمة الضريبة (15%): " + t.toFixed(2) + " ريال";
    } else {
        total = a / 1.15; t = a - total;
        document.getElementById('vTaxAr').innerText = "المبلغ قبل الضريبة: " + total.toFixed(2) + " ريال";
    }
    document.getElementById('vTotalAr').innerText = "الإجمالي: " + Math.round(isAdd ? total : a).toLocaleString() + " ريال";
    document.getElementById('vOutAr').style.display = 'block';
}
</script>
</body>
</html>
