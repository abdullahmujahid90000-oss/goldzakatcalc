<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة الوزن ومؤشر كتلة الجسم</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f6; padding: 20px; text-align: right; }
        .container { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 15px; border-top: 6px solid #27ae60; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; text-align: center; }
        button { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .res { margin-top: 20px; text-align: center; padding: 15px; background: #e8f5e9; border-radius: 8px; display: none; }
    </style>
</head>
<body>
<div class="container">
    <h2 style="text-align:center; color:#27ae60;">حاسبة كتلة الجسم (BMI)</h2>
    <label>الوزن (كيلوجرام):</label>
    <input type="number" id="wAr" placeholder="مثال: 80">
    <label>الطول (سنتيمتر):</label>
    <input type="number" id="hAr" placeholder="مثال: 175">
    
    <button onclick="calcBMIAr()">احسب النتيجة</button>
    
    <div id="bmiOutAr" class="res">
        <p>مؤشر كتلة الجسم لديك: <strong id="valAr"></strong></p>
        <p id="statusAr" style="font-size: 20px; font-weight: bold;"></p>
    </div>
    
    <p style="text-align:center; margin-top:20px;"><a href="/ar/index.html" style="color:#27ae60; text-decoration:none; font-weight:bold;">← العودة للقائمة الرئيسية</a></p>
</div>

<script>
function calcBMIAr() {
    let w = parseFloat(document.getElementById('wAr').value);
    let h = parseFloat(document.getElementById('hAr').value) / 100;
    if(w > 0 && h > 0) {
        let bmi = w / (h * h);
        let s = "";
        if(bmi < 18.5) s = "وزن ناقص";
        else if(bmi < 25) s = "وزن مثالي";
        else if(bmi < 30) s = "وزن زائد";
        else s = "سمنة";
        document.getElementById('valAr').innerText = bmi.toFixed(1);
        document.getElementById('statusAr').innerText = s;
        document.getElementById('bmiOutAr').style.display = 'block';
    }
}
</script>
</body>
</html>
