<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محول العملات للوافدين 2026 | تحويل الريال السعودي</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f6; padding: 20px; text-align: right; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; text-align: center; }
        .res-display { margin-top: 25px; text-align: center; padding: 20px; background: #e8f5e9; border-radius: 8px; display: none; }
    </style>
</head>
<body>
<div class="container">
    <h1>محول تحويلات المغتربين</h1>
    <p style="text-align:center;">أسعار الصرف المباشرة - 6 أبريل 2026</p>

    <div style="background: #f9f9f9; padding: 20px; border: 1px solid #ddd; border-radius: 10px;">
        <label>المبلغ بالريال السعودي:</label>
        <input type="number" id="sarAr" placeholder="مثال: 1000" oninput="convertAr()">

        <label>تحويل إلى:</label>
        <select id="currAr" onchange="convertAr()">
            <option value="12.85">مصر (جنيه) - 12.85</option>
            <option value="74.34">باكستان (روبية) - 74.34</option>
            <option value="22.15">الهند (روبية) - 22.15</option>
            <option value="14.92">الفلبين (بيزو) - 14.92</option>
        </select>

        <div id="resBoxAr" class="res-display">
            <p>سيستلم أهلك مبلغ وقدره:</p>
            <h2 id="finalAr" style="color: #27ae60;"></h2>
        </div>
    </div>

    <p style="text-align:center; margin-top:20px;"><a href="/ar/index.html" style="color:#b8860b;">← عرض جميع الأدوات</a></p>
</div>

<script>
function convertAr() {
    let sar = document.getElementById('sarAr').value;
    let rate = document.getElementById('currAr').value;
    if(sar > 0) {
        let total = sar * rate;
        document.getElementById('finalAr').innerText = total.toLocaleString(undefined, {minimumFractionDigits: 2}) + " " + document.getElementById('currAr').options[document.getElementById('currAr').selectedIndex].text.split(' ')[0];
        document.getElementById('resBoxAr').style.display = 'block';
    }
}
</script>
</body>
</html>
