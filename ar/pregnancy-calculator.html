<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة موعد الولادة المتوقع | أدوات العائلة السعودية</title>
</head>
<body style="font-family: 'Segoe UI', Tahoma, sans-serif; padding:20px; text-align: right;">
<div style="max-width:500px; margin:auto; padding:30px; border:1px solid #ccc; border-radius:10px; background:#fff;">
    <h3 style="color:#e91e63; text-align:center;">حاسبة موعد الولادة</h3>
    <label>تاريخ أول يوم لآخر دورة شهرية:</label>
    <input type="date" id="dateAr" style="width:100%; padding:10px; margin:10px 0; text-align:center;">
    <button onclick="calcDueAr()" style="width:100%; padding:15px; background:#e91e63; color:white; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">احسبي موعد الولادة</button>
    <h3 id="dueAr" style="text-align:center; color:#e91e63; margin-top:20px;"></h3>
</div>
<script>
function calcDueAr() {
    let date = new Date(document.getElementById('dateAr').value);
    if(date) {
        date.setDate(date.getDate() + 7);
        date.setMonth(date.getMonth() + 9);
        const options = { year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('dueAr').innerText = "موعد الولادة المتوقع هو: " + date.toLocaleDateString('ar-SA', options);
    }
}
    <div style="text-align: center; margin: 40px 0; padding: 20px; background: #f9f9f9; border-radius: 8px; direction: rtl;">
    <p style="font-size: 18px; font-weight: bold; color: #333;">هل تبحث عن أداة أخرى؟</p>
    <a href="/ar/index.html" style="display: inline-block; padding: 12px 25px; background: #b8860b; color: white; text-decoration: none; border-radius: 5px; font-weight: bold;">
        ← عرض جميع الحاسبات والأدوات السعودية
    </a>
</div>
</script>
</body>
</html>
