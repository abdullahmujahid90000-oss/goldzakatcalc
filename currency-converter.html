<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAR Remittance Converter | Live SAR to PKR, INR, EGP, PHP</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 35px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { color: #1a3a5f; text-align: center; margin-bottom: 5px; }
        .live-status { text-align: center; color: #27ae60; font-weight: bold; font-size: 13px; margin-bottom: 25px; }
        label { font-weight: bold; color: #555; display: block; margin-top: 20px; }
        input, select { width: 100%; padding: 15px; margin-top: 8px; border: 2px solid #e1e8ed; border-radius: 10px; font-size: 18px; box-sizing: border-box; }
        .result-card { margin-top: 30px; background: #1a3a5f; color: white; padding: 25px; border-radius: 12px; text-align: center; }
        #finalAmount { font-size: 36px; font-weight: bold; display: block; margin-top: 10px; }
        .bank-note { font-size: 12px; color: #bdc3c7; margin-top: 10px; }
    </style>
</head>
<body>
<div class="container">
    <h1>Remittance Converter</h1>
    <p class="live-status">● Live Market Rates Active</p>

    <label>Amount in Saudi Riyal (SAR):</label>
    <input type="number" id="sarAmount" placeholder="Enter SAR Amount" oninput="liveConvert()">

    <label>Transfer To:</label>
    <select id="targetCurrency" onchange="liveConvert()">
        <option value="PKR">Pakistan (PKR)</option>
        <option value="INR">India (INR)</option>
        <option value="EGP">Egypt (EGP)</option>
        <option value="PHP">Philippines (PHP)</option>
        <option value="BDT">Bangladesh (BDT)</option>
    </select>

    <div class="result-card">
        <span id="rateLabel">Your family receives:</span>
        <span id="finalAmount">0.00</span>
        <p class="bank-note">Compare with STC Pay, Urpay, and Tahweel Al Rajhi for best results.</p>
    </div>

    <p style="text-align: center; margin-top: 25px;"><a href="/index.html" style="color:#1a3a5f; font-weight:bold; text-decoration:none;">← Back to Toolbox</a></p>
</div>

<script>
    async function liveConvert() {
        const amount = document.getElementById('sarAmount').value;
        const target = document.getElementById('targetCurrency').value;
        
        if(!amount || amount <= 0) return;

        try {
            // Fetching live rates from a free public API
            const response = await fetch(`https://open.er-api.com/v6/latest/SAR`);
            const data = await response.json();
            const rate = data.rates[target];
            
            const total = amount * rate;
            document.getElementById('finalAmount').innerText = total.toLocaleString(undefined, {minimumFractionDigits: 2}) + " " + target;
        } catch (error) {
            console.log("Offline mode active");
        }
    }
</script>
</body>
</html>
