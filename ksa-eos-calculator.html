<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KSA End of Service Calculator 2026</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 12px; border-top: 6px solid #2d5a27; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #2d5a27; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .res { margin-top: 20px; padding: 20px; background: #e8f5e9; border-radius: 8px; display: none; text-align: center; }
    </style>
</head>
<body>
<div class="container">
    <h2 style="text-align:center; color:#2d5a27;">EOS Calculator (Saudi Labor Law)</h2>
    <label>Last Basic Salary (SAR):</label>
    <input type="number" id="salary" placeholder="e.g., 10000">
    <label>Years of Service:</label>
    <input type="number" id="years" placeholder="e.g., 5">
    <label>Reason for Leaving:</label>
    <select id="reason">
        <option value="term">Contract Terminated by Company</option>
        <option value="resign">Resignation</option>
    </select>
    
    <button onclick="calcEOS()">Calculate Reward</button>
    
    <div id="eosOut" class="res">
        <p>Estimated Reward Amount:</p>
        <h2 id="reward" style="color:#2d5a27;"></h2>
    </div>
    
    <p style="text-align:center; margin-top:20px;"><a href="/index.html" style="color:#2d5a27; text-decoration:none; font-weight:bold;">← Back to Main Menu</a></p>
</div>

<script>
function calcEOS() {
    let s = parseFloat(document.getElementById('salary').value);
    let y = parseFloat(document.getElementById('years').value);
    let r = document.getElementById('reason').value;
    if(!s || !y) return;

    let base = (y <= 5) ? (s / 2) * y : (s / 2) * 5 + (s * (y - 5));
    let final = base;

    if (r === "resign") {
        if (y < 2) final = 0;
        else if (y < 5) final = base * (1/3);
        else if (y < 10) final = base * (2/3);
    }
    document.getElementById('reward').innerText = Math.round(final).toLocaleString() + " SAR";
    document.getElementById('eosOut').style.display = 'block';
}
</script>
</body>
</html>
