<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Car Finance & Insurance Calculator KSA | New & Used</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.1); }
        .calc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; background: #f9f9f9; padding: 25px; border-radius: 12px; }
        h1 { color: #1a3a5f; text-align: center; }
        label { font-weight: bold; font-size: 14px; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { grid-column: span 2; padding: 15px; background: #1a3a5f; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 18px; }
        .result-box { grid-column: span 2; margin-top: 20px; padding: 20px; background: #eef6ff; border: 2px solid #bcd; border-radius: 10px; text-align: center; display: none; }
        .nav-footer { text-align: center; margin-top: 40px; padding: 20px; background: #f9f9f9; border-radius: 10px; }
        .btn-home { display: inline-block; padding: 12px 25px; background: #b8860b; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>All-Car Finance Calculator</h1>
    
    <div class="calc-grid">
        <div style="grid-column: span 2;">
            <label>Car Type:</label>
            <select id="carType" onchange="updateDefault()">
                <option value="new">New Car (Agency)</option>
                <option value="used">Used Car (Showroom/Haraj)</option>
            </select>
        </div>
        <div>
            <label>Price (SAR):</label>
            <input type="number" id="price" placeholder="e.g. 100000">
        </div>
        <div>
            <label>Down Payment (SAR):</label>
            <input type="number" id="down" placeholder="e.g. 10000">
        </div>
        <div>
            <label>Profit Rate (%):</label>
            <input type="number" id="rate" value="4.5">
        </div>
        <div>
            <label>Term (Years):</label>
            <input type="number" id="term" value="5">
        </div>
        <button onclick="calculate()">Calculate Monthly Payment</button>

        <div id="res" class="result-box">
            <p>Monthly Installment (With Insurance):</p>
            <h2 id="totalOut" style="color: #1a3a5f;"></h2>
            <p id="insOut" style="color: #27ae60; font-weight: bold;"></p>
        </div>
    </div>

    <div class="nav-footer">
        <p>Need a different tool?</p>
        <a href="/index.html" class="btn-home">← Back to Main Menu</a>
    </div>
</div>

<script>
function updateDefault() {
    const type = document.getElementById('carType').value;
    document.getElementById('rate').value = (type === 'used') ? "6.5" : "4.5";
    document.getElementById('term').value = (type === 'used') ? "3" : "5";
}
function calculate() {
    let p = parseFloat(document.getElementById('price').value);
    let d = parseFloat(document.getElementById('down').value) || 0;
    let r = (parseFloat(document.getElementById('rate').value) / 100) / 12;
    let t = parseFloat(document.getElementById('term').value) * 12;
    if (!p) return;
    let loan = p - d;
    let monthlyLoan = (loan * r) / (1 - Math.pow(1 + r, -t));
    let monthlyIns = (p * 0.04) / 12; 
    document.getElementById('totalOut').innerText = Math.round(monthlyLoan + monthlyIns).toLocaleString() + " SAR";
    document.getElementById('insOut').innerText = "Includes approx. " + Math.round(monthlyIns) + " SAR for Insurance";
    document.getElementById('res').style.display = 'block';
}
</script>
</body>
</html>
