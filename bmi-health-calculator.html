<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI & Weight Loss Calculator</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 15px; border-top: 6px solid #27ae60; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .res { margin-top: 20px; text-align: center; padding: 15px; background: #e8f5e9; border-radius: 8px; display: none; }
    </style>
</head>
<body>
<div class="container">
    <h2 style="text-align:center; color:#27ae60;">Health BMI Calculator</h2>
    <label>Weight (kg):</label>
    <input type="number" id="w" placeholder="e.g., 80">
    <label>Height (cm):</label>
    <input type="number" id="h" placeholder="e.g., 175">
    
    <button onclick="calcBMI()">Calculate My Score</button>
    
    <div id="bmiOut" class="res">
        <p>Your BMI is: <strong id="val"></strong></p>
        <p id="status" style="font-size: 20px; font-weight: bold;"></p>
    </div>
    
    <p style="text-align:center; margin-top:20px;"><a href="/index.html" style="color:#27ae60; text-decoration:none; font-weight:bold;">← Back to Main Menu</a></p>
</div>

<script>
function calcBMI() {
    let w = parseFloat(document.getElementById('w').value);
    let h = parseFloat(document.getElementById('h').value) / 100;
    if(w > 0 && h > 0) {
        let bmi = w / (h * h);
        let s = "";
        if(bmi < 18.5) s = "Underweight";
        else if(bmi < 25) s = "Healthy Weight";
        else if(bmi < 30) s = "Overweight";
        else s = "Obese";
        document.getElementById('val').innerText = bmi.toFixed(1);
        document.getElementById('status').innerText = s;
        document.getElementById('bmiOut').style.display = 'block';
    }
}
</script>
</body>
</html>
