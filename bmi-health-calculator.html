<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI & Weight Loss Calculator | Health Tools Riyadh</title>
    <style>
        body { font-family: sans-serif; background: #fdfdfd; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 15px; border: 1px solid #eee; }
        button { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .status { font-weight: bold; font-size: 20px; margin-top: 10px; }
    </style>
</head>
<body>
<div class="container">
    <h2 style="color:#27ae60; text-align:center;">BMI & Health Calculator</h2>
    <label>Weight (kg):</label>
    <input type="number" id="weightBmi" style="width:100%; padding:10px; margin:10px 0;" placeholder="e.g. 80">
    <label>Height (cm):</label>
    <input type="number" id="heightBmi" style="width:100%; padding:10px; margin:10px 0;" placeholder="e.g. 175">
    <button onclick="calcBMI()">Check My BMI</button>
    <div id="bmiRes" style="text-align:center; display:none; margin-top:20px;">
        <p>Your BMI is: <span id="bmiVal" style="font-size:24px; font-weight:bold;"></span></p>
        <p class="status" id="bmiStatus"></p>
    </div>
</div>
<script>
function calcBMI() {
    let w = document.getElementById('weightBmi').value;
    let h = document.getElementById('heightBmi').value / 100;
    if(w > 0 && h > 0) {
        let bmi = w / (h * h);
        let status = "";
        if(bmi < 18.5) status = "Underweight";
        else if(bmi < 25) status = "Healthy Weight";
        else if(bmi < 30) status = "Overweight";
        else status = "Obese";
        document.getElementById('bmiVal').innerText = bmi.toFixed(1);
        document.getElementById('bmiStatus').innerText = status;
        document.getElementById('bmiRes').style.display = 'block';
    }
}
    <div style="text-align: center; margin: 40px 0; padding: 20px; background: #f9f9f9; border-radius: 8px;">
    <p style="font-size: 18px; font-weight: bold; color: #333;">Looking for another tool?</p>
    <a href="/index.html" style="display: inline-block; padding: 12px 25px; background: #b8860b; color: white; text-decoration: none; border-radius: 5px; font-weight: bold;">
        ← View All Saudi Calculators & Tools
    </a>
</div>
</script>
</body>
</html>
