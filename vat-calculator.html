<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saudi VAT Calculator 15%</title>
    <style>
        body { font-family: sans-serif; background: #f8f9fa; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 12px; border-top: 6px solid #004a99; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 18px; text-align: center; }
        .btn-group { display: flex; gap: 10px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; }
        .add { background: #004a99; }
        .remove { background: #6c757d; }
        .res { margin-top: 20px; padding: 20px; background: #f1f8ff; border-radius: 8px; display: none; text-align: center; }
    </style>
</head>
<body>
<div class="container">
    <h2 style="text-align:center; color:#004a99;">Saudi VAT Calculator (15%)</h2>
    <input type="number" id="amt" placeholder="Enter Amount (SAR)">
    <div class="btn-group">
        <button class="add" onclick="vat(true)">Add 15% VAT</button>
        <button class="remove" onclick="vat(false)">Excl. 15% VAT</button>
    </div>
    
    <div id="vOut" class="res">
        <p id="vTax"></p>
        <h2 id="vTotal"></h2>
    </div>
    
    <p style="text-align:center; margin-top:20px;"><a href="/index.html" style="color:#004a99; text-decoration:none; font-weight:bold;">← Back to Main Menu</a></p>
</div>

<script>
function vat(isAdd) {
    let a = parseFloat(document.getElementById('amt').value);
    if(!a) return;
    let t, total;
    if(isAdd) {
        t = a * 0.15; total = a + t;
        document.getElementById('vTax').innerText = "VAT Amount (15%): " + t.toFixed(2) + " SAR";
    } else {
        total = a / 1.15; t = a - total;
        document.getElementById('vTax').innerText = "Amount Before VAT: " + total.toFixed(2) + " SAR";
    }
    document.getElementById('vTotal').innerText = "Total: " + Math.round(isAdd ? total : a).toLocaleString() + " SAR";
    document.getElementById('vOut').style.display = 'block';
}
</script>
</body>
</html>
